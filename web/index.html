<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Basmi</title>
  <meta name="description" content="The app that keeps relationships warm.">

  <!-- Fonts from Google Fonts CDN (replaces embedded woff2 assets) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,400..600;1,6..72,400..600&display=swap" rel="stylesheet">

  <!-- React 18 + Babel standalone (for JSX transform) -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>

:root {
  --serif: 'Newsreader', Georgia, 'Times New Roman', serif;
  --sans: 'Hanken Grotesk', system-ui, -apple-system, sans-serif;

  --paper: #F6F0E6;
  --paper-2: #EFE7D8;
  --card: #FFFCF6;
  --ink: #2C2620;
  --ink-2: #756B5C;
  --ink-3: #ADA290;
  --line: #ECE3D2;

  --clay: #C2674A;                 /* overridden by Tweaks accent */
  --clay-deep: color-mix(in oklab, var(--clay), #3a1d10 30%);
  --clay-soft: color-mix(in oklab, var(--clay), #fff 80%);

  --sage: #79864F;
  --sage-soft: color-mix(in oklab, var(--sage), #fff 80%);
  --amber: #C0892F;
  --amber-soft: color-mix(in oklab, var(--amber), #fff 80%);
}

* { box-sizing: border-box; }
html, body { margin: 0; }
body {
  background: #E7E1D6;
  background-image: radial-gradient(circle at 50% 0%, #EFE9DF 0%, #E3DDD0 60%, #DDD6C8 100%);
  font-family: var(--sans);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

/* presentation page  */
.page { max-width: 1180px; margin: 0 auto; padding: 64px 32px 120px; }
.masthead { text-align: center; margin-bottom: 8px; }
.wordmark { font-family: var(--serif); font-size: 52px; font-weight: 500; letter-spacing: -0.01em; color: var(--ink); }
.wordmark .dot { color: var(--clay); }
.tagline { font-family: var(--serif); font-style: italic; font-size: 22px; color: var(--ink-2); margin-top: 4px; }
.subtag { font-size: 14.5px; color: var(--ink-2); margin-top: 14px; max-width: 540px; margin-left: auto; margin-right: auto; line-height: 1.55; }
.legend { display: flex; gap: 18px; justify-content: center; margin-top: 22px; flex-wrap: wrap; }
.legend-item { display: inline-flex; align-items: center; gap: 7px; font-size: 12.5px; font-weight: 600; color: var(--ink-2); }
.legend-item .sw { width: 9px; height: 9px; border-radius: 50%; }

.section { margin-top: 72px; }
.section-head { display: flex; align-items: baseline; gap: 14px; margin-bottom: 6px; }
.section-num { font-family: var(--serif); font-size: 16px; color: var(--clay); font-weight: 600; }
.section-title { font-family: var(--serif); font-size: 30px; font-weight: 500; color: var(--ink); letter-spacing: -0.01em; white-space: nowrap; }
.section-desc { font-size: 14.5px; color: var(--ink-2); max-width: 560px; line-height: 1.6; margin: 0 0 36px; }

.devices { display: flex; gap: 56px; justify-content: center; align-items: flex-start; flex-wrap: wrap; }
.device-col { display: flex; flex-direction: column; align-items: center; gap: 16px; }
.device-label { display: inline-flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 700; color: var(--ink-2); letter-spacing: 0.04em; text-transform: uppercase; }
.device-label .pf { width: 7px; height: 7px; border-radius: 50%; background: var(--clay); }

/* widgets section */
.widgets-wrap { display: flex; gap: 48px; justify-content: center; align-items: flex-start; flex-wrap: wrap; }
.home-mock {
  width: 320px; border-radius: 44px; padding: 14px; flex-shrink: 0;
  background:
    radial-gradient(120% 80% at 20% 0%, #d8b79e 0%, rgba(216,183,158,0) 55%),
    radial-gradient(110% 90% at 90% 25%, #b6927d 0%, rgba(182,146,125,0) 50%),
    linear-gradient(170deg, #c8a890 0%, #9e7d6a 55%, #7d6253 100%);
  box-shadow: 0 40px 80px rgba(60,40,28,0.28), inset 0 0 0 1px rgba(255,255,255,0.18);
  position: relative;
}
.home-mock-inner { border-radius: 32px; padding: 18px 16px 14px; min-height: 540px; display: flex; flex-direction: column; }
.home-time { text-align: center; color: #fff; font-weight: 300; font-size: 64px; line-height: 1; letter-spacing: 0.01em; margin: 18px 0 4px; text-shadow: 0 2px 16px rgba(0,0,0,0.18); }
.home-date { text-align: center; color: rgba(255,255,255,0.92); font-size: 15px; font-weight: 600; margin-bottom: 26px; text-shadow: 0 1px 6px rgba(0,0,0,0.2); }
.home-widget-slot { display: flex; justify-content: center; margin-bottom: 26px; }
.home-icons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px 16px; margin-top: auto; }
.app-ic { display: flex; flex-direction: column; align-items: center; gap: 6px; }
.app-ic .glyph { width: 56px; height: 56px; border-radius: 15px; display: flex; align-items: center; justify-content: center; color: #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.18); }
.app-ic .nm { font-size: 11px; color: #fff; text-shadow: 0 1px 4px rgba(0,0,0,0.3); }
.home-dock { margin-top: 16px; background: rgba(255,255,255,0.2); backdrop-filter: blur(12px); border-radius: 26px; padding: 10px; display: flex; justify-content: space-around; }

.widget-menu { display: flex; flex-direction: column; gap: 14px; max-width: 360px; }
.widget-menu-title { font-family: var(--serif); font-size: 19px; color: var(--ink); margin-bottom: 2px; }
.widget-opt { background: var(--card); border: 1.5px solid var(--line); border-radius: 22px; padding: 16px; cursor: pointer; transition: border-color .15s, box-shadow .15s, transform .15s; }
.widget-opt:hover { transform: translateY(-2px); box-shadow: 0 14px 30px rgba(80,55,35,0.12); }
.widget-opt.featured { border-color: var(--clay); box-shadow: 0 0 0 3px var(--clay-soft); }
.widget-opt-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.widget-opt-name { font-weight: 700; font-size: 14px; color: var(--ink); white-space: nowrap; }
.widget-opt-tag { font-size: 11px; font-weight: 600; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.04em; }
.widget-opt-feat { font-size: 11px; font-weight: 700; color: var(--clay); display: inline-flex; align-items: center; gap: 4px; }
.widget-opt-preview { display: flex; justify-content: center; }
.widget-opt-preview .wdg { box-shadow: 0 6px 18px rgba(50,32,20,0.14); }

/*  THE APP  (inside both device frames) */
.basmi { position: relative; height: 100%; display: flex; flex-direction: column; overflow: hidden; background: var(--paper); font-family: var(--sans); color: var(--ink); }
.basmi *::-webkit-scrollbar { width: 0; height: 0; }
.app-scroll { flex: 1; overflow-y: auto; overflow-x: hidden; }
.app-ios .app-scroll { padding-top: 52px; }
.app-android .app-scroll { padding-top: 12px; }

.screen-body { padding: 4px 18px 16px; }

.hdr { display: flex; align-items: flex-start; justify-content: space-between; padding: 10px 2px 2px; }
.hdr-kicker { font-size: 13.5px; font-weight: 600; color: var(--ink-2); }
.hdr-title { font-family: var(--serif); font-size: 38px; font-weight: 500; letter-spacing: -0.015em; margin: 2px 0 0; color: var(--ink); }
.hdr-sub { font-size: 15px; color: var(--ink-2); margin: 4px 2px 18px; }
.streak-chip { display: inline-flex; align-items: center; gap: 6px; background: var(--clay-soft); color: var(--clay-deep); padding: 7px 12px; border-radius: 999px; font-size: 13px; margin-top: 6px; white-space: nowrap; flex-shrink: 0; }
.streak-chip b { font-weight: 700; }

/* today card */
.today-card { background: var(--card); border-radius: 24px; padding: 18px; margin-bottom: 14px; box-shadow: 0 1px 2px rgba(70,50,30,0.04), 0 10px 26px rgba(70,50,30,0.06); border: 1px solid var(--line); cursor: pointer; }
.today-card-top { display: flex; align-items: center; gap: 13px; }
.tc-name { font-family: var(--serif); font-size: 21px; font-weight: 500; color: var(--ink); line-height: 1.1; }
.tc-rel { font-size: 13px; color: var(--ink-2); margin-top: 3px; }
.tc-nudge { font-size: 15.5px; line-height: 1.5; color: var(--ink); margin: 14px 2px 0; }
.tc-note { display: flex; gap: 8px; align-items: flex-start; margin: 12px 0 2px; padding: 10px 12px; background: var(--paper-2); border-radius: 14px; font-size: 13px; color: var(--ink-2); line-height: 1.45; }
.tc-note svg { color: var(--clay); flex-shrink: 0; margin-top: 1px; }
.tc-actions { display: flex; gap: 9px; margin-top: 16px; }

/* section label */
.section-label { display: flex; align-items: baseline; justify-content: space-between; margin: 26px 4px 12px; font-size: 12.5px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; color: var(--ink-3); }

/* cards & lists */
.card { background: var(--card); border-radius: 22px; border: 1px solid var(--line); box-shadow: 0 1px 2px rgba(70,50,30,0.04), 0 8px 22px rgba(70,50,30,0.05); overflow: hidden; margin-bottom: 14px; }
.card.pad { padding: 16px 18px; }
.list { padding: 4px 0; }

.circle-row { display: flex; align-items: center; gap: 13px; padding: 11px 16px; cursor: pointer; position: relative; }
.circle-row:not(.last)::after { content: ''; position: absolute; left: 73px; right: 16px; bottom: 0; height: 1px; background: var(--line); }
.circle-row:active { background: var(--paper-2); }
.cr-name { font-size: 16px; font-weight: 600; color: var(--ink); }
.cr-sub { font-size: 13px; color: var(--ink-2); margin-top: 1px; }
.cr-right { display: flex; align-items: center; gap: 10px; }

.search { display: flex; align-items: center; gap: 9px; background: var(--paper-2); border-radius: 14px; padding: 11px 14px; margin: 4px 2px 16px; font-size: 14.5px; color: var(--ink-3); }

/* Profile */
.screen-overlay { position: absolute; inset: 0; background: var(--paper); z-index: 20; display: flex; flex-direction: column; overflow-y: auto; }
.app-ios .screen-overlay { padding-top: 48px; }
.app-android .screen-overlay { padding-top: 8px; }
.profile-top { display: flex; align-items: center; justify-content: space-between; padding: 8px 14px 0; }
.round-btn { width: 40px; height: 40px; border-radius: 50%; border: none; background: var(--card); color: var(--ink); display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 2px 8px rgba(70,50,30,0.08); }
.profile-head { text-align: center; padding: 6px 0 4px; display: flex; flex-direction: column; align-items: center; }
.profile-name { font-family: var(--serif); font-size: 30px; font-weight: 500; margin: 14px 0 2px; color: var(--ink); }
.profile-rel { font-size: 14.5px; color: var(--ink-2); }
.profile-actions { display: flex; gap: 10px; margin: 18px 0 6px; }
.pa-btn { flex: 1; background: var(--card); border: 1px solid var(--line); border-radius: 18px; padding: 14px 0 11px; display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; color: var(--ink-2); font-family: var(--sans); font-size: 12.5px; font-weight: 600; box-shadow: 0 6px 16px rgba(70,50,30,0.05); }
.pa-btn.primary { background: var(--clay); border-color: var(--clay); color: #fff; }
.pa-btn:active { transform: scale(0.97); }

.card-row-between { display: flex; align-items: center; justify-content: space-between; }
.mini-label { font-size: 12px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; color: var(--ink-3); margin-bottom: 10px; }
.link-btn { background: none; border: none; color: var(--clay); font-family: var(--sans); font-weight: 600; font-size: 13.5px; cursor: pointer; margin-bottom: 10px; }
.freq-display { display: flex; align-items: center; gap: 9px; font-size: 15.5px; color: var(--ink); flex-wrap: wrap; }
.freq-display b { font-weight: 600; }
.freq-since { color: var(--ink-2); font-size: 13.5px; }
.freq-chips { display: flex; flex-wrap: wrap; gap: 8px; }
.freq-chips.big { margin-top: 6px; }
.chip { border: 1.5px solid var(--line); background: var(--card); color: var(--ink-2); border-radius: 999px; padding: 9px 14px; font-family: var(--sans); font-size: 13.5px; font-weight: 600; cursor: pointer; transition: all .12s; }
.chip.active { background: var(--clay); border-color: var(--clay); color: #fff; }
.note-text { font-size: 15.5px; line-height: 1.55; color: var(--ink); margin: 0; font-family: var(--serif); }
.detail-list, .history-list { display: flex; flex-direction: column; gap: 12px; }
.detail-row { display: flex; align-items: center; gap: 10px; font-size: 14.5px; }
.detail-k { color: var(--ink-2); width: 78px; flex-shrink: 0; }
.detail-v { color: var(--ink); font-weight: 600; flex: 1; min-width: 0; }
.history-row { display: flex; align-items: center; gap: 11px; font-size: 14.5px; color: var(--ink); }
.hist-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--clay-soft); border: 1.5px solid var(--clay); flex-shrink: 0; }

/* calling overlay  */
.calling { position: absolute; inset: 0; z-index: 30; background: linear-gradient(165deg, var(--clay-deep), #2c1d14); display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; }
.calling-inner { text-align: center; }
.calling-pulse { display: inline-block; border-radius: 50%; animation: pulse 1.8s ease-in-out infinite; }
@keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(255,255,255,0.25); } 50% { box-shadow: 0 0 0 26px rgba(255,255,255,0); } }
.calling-name { font-family: var(--serif); font-size: 30px; font-weight: 500; margin-top: 26px; }
.calling-status { font-size: 16px; opacity: 0.7; margin-top: 6px; font-variant-numeric: tabular-nums; }
.end-call { width: 68px; height: 68px; border-radius: 50%; border: none; background: #d6453b; color: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; margin-top: 64px; transform: rotate(135deg); box-shadow: 0 10px 30px rgba(214,69,59,0.5); }
.end-call:active { transform: rotate(135deg) scale(0.94); }
.calling-hint { position: absolute; bottom: 46px; font-size: 13px; opacity: 0.6; }

/* sheets  */
.sheet-scrim { position: absolute; inset: 0; z-index: 30; background: rgba(40,28,18,0.42); display: flex; align-items: flex-end; }
.sheet { width: 100%; background: var(--paper); border-radius: 30px 30px 0 0; padding: 10px 20px 22px; max-height: 92%; overflow-y: auto; }
.app-ios .sheet { padding-bottom: 36px; }
.sheet-grip { width: 38px; height: 5px; border-radius: 3px; background: var(--ink-3); opacity: 0.4; margin: 2px auto 14px; }
.sheet-head { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
.sheet-title { font-family: var(--serif); font-size: 23px; font-weight: 500; color: var(--ink); margin: 0; line-height: 1.15; }
.sheet-title.solo { margin: 4px 2px 8px; }
.sheet-sub { font-size: 14.5px; color: var(--ink-2); margin: 0 2px 16px; line-height: 1.5; }

.mood-row { display: flex; gap: 10px; margin: 14px 0 18px; }
.mood { flex: 1; background: var(--card); border: 1.5px solid var(--line); border-radius: 18px; padding: 14px 6px 11px; display: flex; flex-direction: column; align-items: center; gap: 7px; cursor: pointer; transition: all .12s; }
.mood.active { border-color: var(--clay); background: var(--clay-soft); }
.mood-face { font-size: 24px; line-height: 1; color: var(--clay-deep); }
.mood-label { font-size: 12.5px; font-weight: 600; color: var(--ink-2); }
.mood.active .mood-label { color: var(--clay-deep); }

.field-label { display: block; font-size: 13px; font-weight: 600; color: var(--ink-2); margin: 4px 2px 7px; }
.field { width: 100%; border: 1.5px solid var(--line); background: var(--card); border-radius: 14px; padding: 12px 14px; font-family: var(--sans); font-size: 15px; color: var(--ink); resize: none; margin-bottom: 14px; }
.field:focus { outline: none; border-color: var(--clay); }
.field::placeholder { color: var(--ink-3); }

.sheet-footer { margin-top: 6px; display: flex; flex-direction: column; align-items: center; gap: 6px; }
.text-btn { background: none; border: none; color: var(--ink-2); font-family: var(--sans); font-size: 14px; font-weight: 600; cursor: pointer; padding: 8px; }

.add-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
.add-row { display: flex; align-items: center; gap: 12px; background: var(--card); border: 1.5px solid var(--line); border-radius: 16px; padding: 11px 14px; cursor: pointer; transition: all .12s; }
.add-row.picked { border-color: var(--clay); background: var(--clay-soft); }
.radio { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--ink-3); display: flex; align-items: center; justify-content: center; color: #fff; flex-shrink: 0; }
.radio.on { background: var(--clay); border-color: var(--clay); }

/*  bottom nav  */
.bottom-nav { position: relative; z-index: 5; display: flex; align-items: center; justify-content: space-around; padding: 12px 28px 12px; background: color-mix(in oklab, var(--paper), #fff 30%); border-top: 1px solid var(--line); }
.app-ios .bottom-nav { padding-bottom: 28px; }
.nav-item { background: none; border: none; display: flex; flex-direction: column; align-items: center; gap: 3px; color: var(--ink-3); font-family: var(--sans); font-size: 11px; font-weight: 600; cursor: pointer; }
.nav-item.active { color: var(--clay); }
.nav-add { width: 54px; height: 54px; border-radius: 50%; border: none; background: var(--clay); color: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 8px 20px color-mix(in oklab, var(--clay), transparent 55%); margin-top: -22px; }
.nav-add:active { transform: scale(0.94); }

/*  toast  */
.toast { position: absolute; left: 50%; bottom: 96px; transform: translateX(-50%); z-index: 40; background: var(--ink); color: #fff; padding: 12px 18px; border-radius: 999px; font-size: 13.5px; font-weight: 600; display: flex; align-items: center; gap: 8px; box-shadow: 0 12px 30px rgba(0,0,0,0.28); white-space: nowrap; }
.toast svg { color: #ff9b7a; }

/*  WIDGETS */
.wdg { background: var(--card); border-radius: 24px; box-shadow: 0 14px 34px rgba(50,32,20,0.28); font-family: var(--sans); overflow: hidden; }
.wdg-md { width: 280px; height: 150px; padding: 14px 18px; display: flex; flex-direction: column; }
.wdg-1x1 { width: 160px; height: 160px; padding: 14px; display: flex; flex-direction: column; }
.wdg-title { font-family: var(--serif); font-size: 17px; font-weight: 600; color: var(--ink); display: flex; align-items: center; gap: 7px; white-space: nowrap; }
.wdg-count { background: var(--clay); color: #fff; font-family: var(--sans); font-size: 11px; font-weight: 700; border-radius: 999px; padding: 1px 7px; }

/* who-to-call (1—1) */
.w1-head { display: flex; align-items: center; gap: 10px; }
.w1-name { font-family: var(--serif); font-size: 15.5px; font-weight: 500; color: var(--ink); line-height: 1.1; flex: 1; min-width: 0; text-wrap: balance; }
.w1-info { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 3px; min-height: 0; }
.w1-sub { font-size: 11px; color: var(--ink-2); }
.w1-safe { display: inline-flex; align-items: center; gap: 3px; font-size: 11px; font-weight: 700; color: var(--sage); }
.w1-foot { display: flex; align-items: center; justify-content: space-between; }
.w1-ring { position: relative; flex-shrink: 0; }
.w1-ring-svg { display: block; transform: rotate(-90deg); }
.w1-ring-mid { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; line-height: 1; }
.w1-ring-mid b { font-size: 13px; font-weight: 700; font-variant-numeric: tabular-nums; }
.w1-call { width: 42px; height: 42px; border-radius: 50%; background: var(--clay); color: #fff; border: none; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 13px color-mix(in oklab, var(--clay), transparent 58%); transition: background .2s, box-shadow .2s; }
.w1-call.done { background: var(--sage); box-shadow: 0 5px 13px color-mix(in oklab, var(--sage), transparent 58%); }

/* coming up (medium) */
.wcd-list { display: flex; flex-direction: column; gap: 9px; margin-top: 9px; }
.wcd-row { display: flex; align-items: center; gap: 9px; }
.wcd-name { font-size: 13.5px; font-weight: 600; color: var(--ink); width: 50px; flex-shrink: 0; }
.wcd-bar { flex: 1; height: 6px; border-radius: 3px; background: var(--paper-2); overflow: hidden; }
.wcd-bar span { display: block; height: 100%; border-radius: 3px; }
.wcd-gap { font-size: 11.5px; font-weight: 700; color: var(--ink-2); width: 42px; text-align: right; }

/* overdue (medium) */
.wov-list { display: flex; flex-direction: column; gap: 9px; margin-top: 9px; }
.wov-row { display: flex; align-items: center; gap: 10px; }
.wov-name { flex: 1; font-size: 13.5px; font-weight: 600; color: var(--ink); }
.wov-late { font-size: 11.5px; font-weight: 700; color: var(--clay-deep); background: var(--clay-soft); padding: 3px 8px; border-radius: 999px; white-space: nowrap; }
.wov-empty { font-size: 13.5px; color: var(--ink-2); margin-top: 14px; }

@media (max-width: 720px) {
  .page { padding: 40px 16px 100px; }
  .devices, .widgets-wrap { gap: 32px; }
}

  </style>
</head>
<body>
  <div id="root"></div>

  <!-- ============================================================
       SEED DATA + HELPERS
       ============================================================ -->
  <script>
// basmi — seed data + helpers (plain JS, attached to window)

// Warm avatar hues used for initial-circle avatars
const AVATAR_TONES = {
  clay:   { bg: '#E8C3AE', ink: '#8A4326' },
  sage:   { bg: '#CBD3B4', ink: '#4F5A38' },
  amber:  { bg: '#EAD2A0', ink: '#876626' },
  rose:   { bg: '#E9C2BE', ink: '#8E4742' },
  ochre:  { bg: '#E3CC9A', ink: '#806326' },
  fern:   { bg: '#C2D1BD', ink: '#465943' },
  dune:   { bg: '#E0CDB6', ink: '#7B6240' },
  plum:   { bg: '#D9C3C9', ink: '#73495A' },
  teal:   { bg: '#BAD0CB', ink: '#3F5C56' },
};

// each person: lastDays = how many days ago we last talked (mutable in prototype)
const SEED_PEOPLE = [
  { id: 'maya',  name: 'Maya Chen',    rel: 'Best friend',      tone: 'rose',  freq: 14, lastDays: 23,
    note: 'Just opened her ceramics studio downtown — wants me to visit.',
    details: [{ k: 'Birthday', v: 'Mar 3' }, { k: 'Lives in', v: 'Portland' }],
    history: ['Studio opening', 'Her dad’s 60th', 'Weekend in Tahoe'] },

  { id: 'dad',   name: 'Dad',          rel: 'Family',           tone: 'teal',  freq: 7,  lastDays: 9,
    note: 'Knee surgery went well — starting physio this week.',
    details: [{ k: 'Birthday', v: 'Nov 12' }, { k: 'Ask about', v: 'Physio + the garden' }],
    history: ['Physio plan', 'New tomatoes', 'Fishing trip idea'] },

  { id: 'priya', name: 'Priya Nair',   rel: 'Mentor',           tone: 'plum',  freq: 21, lastDays: 26,

    details: [{ k: 'Ask about', v: 'The new team' }],
    history: ['New role', 'Career advice', 'Coffee in SF'] },

  { id: 'leo',   name: 'Leo Park',     rel: 'Old friend',       tone: 'ochre', freq: 45, lastDays: 51,
    note: 'The twins just started kindergarten.',
    details: [{ k: 'Kids', v: 'Mina & Theo (5)' }, { k: 'Birthday', v: 'Jul 22' }],
    history: ['Twins’ first day', 'House move', 'Old band reunion'] },

  { id: 'sam',   name: 'Sam Rivera',   rel: 'Brother',          tone: 'clay',  freq: 10, lastDays: 4,
    note: 'Training for his first half-marathon in the spring.',
    details: [{ k: 'Birthday', v: 'Sep 8' }],
    history: ['Marathon training', 'Game night', 'Mom’s visit'] },

  { id: 'rose',  name: 'Grandma Rose', rel: 'Family',           tone: 'amber', freq: 7,  lastDays: 6,
    note: 'Loves the photos you sent — print some for her album.',
    details: [{ k: 'Birthday', v: 'Feb 14' }, { k: 'Ask about', v: 'Her bridge club' }],
    history: ['Photo album', 'Bridge club', 'Old recipes'] },

  { id: 'jordan',name: 'Jordan Ellis', rel: 'College roommate', tone: 'fern',  freq: 30, lastDays: 12,
    note: 'Theo is obsessed with dinosaurs right now.',

  { id: 'aisha', name: 'Aisha Khan',   rel: 'Work friend',      tone: 'dune',  freq: 14, lastDays: 8,

    details: [{ k: 'Ask about', v: 'Patagonia photos' }],
    history: ['Travel stories', 'Family reunion', 'New apartment'] },
];

// Contacts available to add (not yet in the circle)
const ADD_CONTACTS = [
  { id: 'nora',  name: 'Nora Albright', sub: 'from Contacts', tone: 'plum' },
  { id: 'kai',   name: 'Kai Tanaka',    sub: 'from Contacts', tone: 'teal' },
  { id: 'elena', name: 'Elena Vásquez', sub: 'from Contacts', tone: 'rose' },
  { id: 'marcus',name: 'Marcus Bell',   sub: 'from Contacts', tone: 'ochre' },
  { id: 'yuki',  name: 'Yuki Sato',     sub: 'from Contacts', tone: 'fern' },
  { id: 'omar',  name: 'Omar Haddad',   sub: 'from Contacts', tone: 'dune' },
];

const FREQ_OPTIONS = [
  { days: 7,  label: 'Every week' },
  { days: 14, label: 'Every 2 weeks' },
  { days: 21, label: 'Every 3 weeks' },
  { days: 30, label: 'Every month' },
  { days: 60, label: 'Every 2 months' },
  { days: 90, label: 'Every 3 months' },
];

function initials(name) {
  const parts = name.replace(/^(Grandma|Grandpa|Uncle|Aunt)\s+/i, '').trim().split(/\s+/);
  if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
  return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
}

function freqLabel(days) {
  const found = FREQ_OPTIONS.find(f => f.days === days);
  if (found) return found.label;
  if (days % 7 === 0) return `Every ${days / 7} weeks`;
  return `Every ${days} days`;
}

// status from how overdue we are relative to chosen frequency
function statusOf(p) {
  const r = p.lastDays / p.freq;
  if (r >= 1.4) return { key: 'drifting', label: 'Drifting', tone: 'clay' };
  if (r >= 1.0) return { key: 'due',      label: 'Time to reach out', tone: 'amber' };
  if (r >= 0.7) return { key: 'soon',     label: 'Coming up', tone: 'amber' };
  return { key: 'warm', label: 'In good standing', tone: 'sage' };
}

// people that need attention today, most overdue first
function dueToday(people) {
  return people
    .filter(p => p.lastDays / p.freq >= 1.0)
    .sort((a, b) => (b.lastDays / b.freq) - (a.lastDays / a.freq));
}

function humanGap(days) {
  if (days <= 0) return 'just now';
  if (days === 1) return 'yesterday';
  if (days < 7) return `${days} days ago`;
  const w = Math.round(days / 7);
  if (days < 30) return w === 1 ? 'a week ago' : `${w} weeks ago`;
  const m = Math.round(days / 30);
  return m === 1 ? 'a month ago' : `${m} months ago`;
}

// short form for widgets / chips
function gapShort(days) {
  if (days <= 0) return 'today';
  if (days < 7) return `${days}d`;
  if (days < 30) return `${Math.round(days / 7)}w`;
  return `${Math.round(days / 30)}mo`;
}

// duration phrase, no "ago" — for "it's been ___" / "in ___"
function gapDur(days) {
  if (days <= 0) return 'no time at all';
  if (days === 1) return 'a day';
  if (days < 7) return `${days} days`;
  const w = Math.round(days / 7);
  if (days < 30) return w === 1 ? 'a week' : `${w} weeks`;
  const m = Math.round(days / 30);
  return m === 1 ? 'a month' : `${m} months`;
}

Object.assign(window, {
  AVATAR_TONES, SEED_PEOPLE, ADD_CONTACTS, FREQ_OPTIONS,
  initials, freqLabel, statusOf, dueToday, humanGap, gapShort, gapDur,
});

  </script>

  <script type="text/babel">
// basmi — shared UI primitives

function Avatar({ person, size = 48, ring = null }) {
  const tone = AVATAR_TONES[person.tone] || AVATAR_TONES.clay;
  const fs = Math.round(size * 0.36);
  const el = (
    <div style={{
      width: size, height: size, borderRadius: '50%', flexShrink: 0,
      background: tone.bg, color: tone.ink,
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontFamily: 'var(--sans)', fontWeight: 600, fontSize: fs, letterSpacing: '0.01em',
    }}>{initials(person.name)}</div>
  );
  if (!ring) return el;
  // ring = {pct, color} progress ring around avatar
  const pad = 5;
  const total = size + pad * 2;
  const r = (total - 3) / 2;
  const circ = 2 * Math.PI * r;
  return (
    <div style={{ position: 'relative', width: total, height: total, flexShrink: 0 }}>
      <svg width={total} height={total} style={{ position: 'absolute', inset: 0, transform: 'rotate(-90deg)' }}>
        <circle cx={total / 2} cy={total / 2} r={r} fill="none" stroke="var(--line)" strokeWidth="3" />
        <circle cx={total / 2} cy={total / 2} r={r} fill="none" stroke={ring.color} strokeWidth="3"
          strokeLinecap="round" strokeDasharray={circ}
          strokeDashoffset={circ * (1 - Math.min(ring.pct, 1))} />
      </svg>
      <div style={{ position: 'absolute', top: pad, left: pad }}>{el}</div>
    </div>
  );
}

function StatusPill({ person, small = false }) {
  const s = statusOf(person);
  const c = `var(--${s.tone})`;
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 6,
      fontFamily: 'var(--sans)', fontWeight: 600,
      fontSize: small ? 11 : 12.5, color: c,
      background: `var(--${s.tone}-soft)`, borderRadius: 999,
      padding: small ? '3px 8px' : '4px 10px', letterSpacing: '0.01em', whiteSpace: 'nowrap',
    }}>
      <span style={{ width: 6, height: 6, borderRadius: '50%', background: c }} />
      {s.label}
    </span>
  );
}

function Dot({ tone, size = 9 }) {
  return <span style={{ width: size, height: size, borderRadius: '50%', background: `var(--${tone})`, flexShrink: 0 }} />;
}

// soft pressable button
function PressButton({ children, onClick, variant = 'primary', style = {}, full = false }) {
  const base = {
    border: 'none', cursor: 'pointer', fontFamily: 'var(--sans)', fontWeight: 600,
    fontSize: 16, borderRadius: 999, padding: '13px 20px',
    display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 8,
    width: full ? '100%' : undefined, transition: 'transform .12s ease, filter .12s ease',
    WebkitTapHighlightColor: 'transparent',
  };
  const variants = {
    primary:   { background: 'var(--clay)', color: '#fff' },
    soft:      { background: 'var(--clay-soft)', color: 'var(--clay-deep)' },
    ghost:     { background: 'transparent', color: 'var(--ink-2)', border: '1.5px solid var(--line)' },
    sage:      { background: 'var(--sage)', color: '#fff' },
    quiet:     { background: 'var(--paper-2)', color: 'var(--ink)' },
  };
  return (
    <button onClick={onClick} style={{ ...base, ...variants[variant], ...style }}
      onMouseDown={e => e.currentTarget.style.transform = 'scale(0.97)'}
      onMouseUp={e => e.currentTarget.style.transform = 'scale(1)'}
      onMouseLeave={e => e.currentTarget.style.transform = 'scale(1)'}>
      {children}
    </button>
  );
}

Object.assign(window, { Avatar, StatusPill, Dot, PressButton });

  </script>

  <script type="text/babel">
// basmi — home-screen widget variations (3)
// Each renders as a real-feeling iOS/Android home-screen widget tile.

function WAvatar({ person, size }) {
  const tone = AVATAR_TONES[person.tone] || AVATAR_TONES.clay;
  return (
    <div style={{
      width: size, height: size, borderRadius: '50%', flexShrink: 0,
      background: tone.bg, color: tone.ink, display: 'flex', alignItems: 'center',
      justifyContent: 'center', fontWeight: 600, fontSize: Math.round(size * 0.38),
      fontFamily: 'var(--sans)',
    }}>{initials(person.name)}</div>
  );
}

const first = (p) => p.name.split(' ')[0];

// circular ring around the streak count — fill = time left in the day (clay),
// or a completed ring (sage) once you've called today. Sized to match the call button.
function StreakRing({ value, pct, done, size = 42 }) {
  const sw = 4, r = (size - sw) / 2, circ = 2 * Math.PI * r;
  const color = done ? 'var(--sage)' : 'var(--clay)';
  return (
    <div className="w1-ring" style={{ width: size, height: size }}>
      <svg width={size} height={size} className="w1-ring-svg">
        <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke="var(--line)" strokeWidth={sw} />
        <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke={color} strokeWidth={sw}
          strokeLinecap="round" strokeDasharray={circ} strokeDashoffset={circ * (1 - pct)} />
      </svg>
      <div className="w1-ring-mid" style={{ color }}>
        <Icon name="flame" size={10} />
        <b>{value}</b>
      </div>
    </div>
  );
}

// 1 — Who to call (small / 1×1). Stateful: before vs. after the call.
// dayLeft = fraction of today still remaining (ring counts down to midnight)
function WidgetWhoToday({ person, streak = 21, dayLeft = 0.6 }) {
  const [called, setCalled] = React.useState(false);
  return (
    <div className="wdg wdg-1x1">
      <div className="w1-head">
        <WAvatar person={person} size={38} />
        <div className="w1-name">{person.name}</div>
      </div>
      <div className="w1-info">
        <div className="w1-sub">Last called: {called ? 'just now' : humanGap(person.lastDays)}</div>
        {called && <div className="w1-safe"><Icon name="check" size={12} /> Streak safe</div>}
      </div>
      <div className="w1-foot">
        <StreakRing value={called ? streak + 1 : streak} pct={called ? 1 : dayLeft} done={called} />
        <button className={'w1-call' + (called ? ' done' : '')} onClick={() => setCalled(v => !v)} title={called ? 'Called today' : 'Call'}>
          <Icon name={called ? 'check' : 'phone'} size={18} />
        </button>
      </div>
    </div>
  );
}

// 2 — Coming up (medium): who's approaching their next call, soonest first
function WidgetCountdown({ people }) {
  const list = people
    .filter(p => p.lastDays / p.freq < 1)
    .sort((a, b) => (a.freq - a.lastDays) - (b.freq - b.lastDays))
    .slice(0, 3);
  return (
    <div className="wdg wdg-md">
      <div className="wdg-title">Coming up</div>
      <div className="wcd-list">
        {list.map(p => {
          const left = Math.max(0, p.freq - p.lastDays);
          const s = statusOf(p);
          return (
            <div className="wcd-row" key={p.id}>
              <WAvatar person={p} size={26} />
              <div className="wcd-name">{first(p)}</div>
              <div className="wcd-bar"><span style={{ width: `${Math.min(p.lastDays / p.freq, 1) * 100}%`, background: `var(--${s.tone})` }} /></div>
              <div className="wcd-gap">{left === 0 ? 'today' : 'in ' + left + 'd'}</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// 3 — Overdue (medium): people you were meant to call already
function WidgetOverdue({ people }) {
  const list = people
    .filter(p => p.lastDays / p.freq >= 1)
    .sort((a, b) => (b.lastDays - b.freq) - (a.lastDays - a.freq))
    .slice(0, 3);
  return (
    <div className="wdg wdg-md">
      <div className="wdg-title">Overdue{list.length > 0 && <span className="wdg-count">{list.length}</span>}</div>
      <div className="wov-list">
        {list.length === 0 && <div className="wov-empty">All caught up</div>}
        {list.map(p => {
          const late = p.lastDays - p.freq;
          return (
            <div className="wov-row" key={p.id}>
              <WAvatar person={p} size={26} />
              <div className="wov-name">{first(p)}</div>
              <div className="wov-late">{late}d late</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

Object.assign(window, { WidgetWhoToday, WidgetCountdown, WidgetOverdue });

  </script>

  const due = dueToday(people);
  const cards = due.slice(0, 3);
  const cardIds = new Set(cards.map(p => p.id));
  const rest = [...people].filter(p => !cardIds.has(p.id)).sort((a, b) => b.lastDays / b.freq - a.lastDays / a.freq);
  const streak = 21;

  if (tab === 'circle') {
    const sorted = [...people].sort((a, b) => b.lastDays / b.freq - a.lastDays / a.freq);
    return (
      <div className="screen-body">
        <div className="hdr">
          <div>
            <div className="hdr-kicker">Your circle</div>
            <h1 className="hdr-title">{people.length} people</h1>
          </div>
        </div>
        <div className="search"><Icon name="users" size={16} style={{ color: 'var(--ink-3)' }} /><span>Search your circle</span></div>
        <div className="card list">
          {sorted.map((p, i) => <CircleRow key={p.id} person={p} onOpen={openPerson} last={i === sorted.length - 1} />)}
        </div>
        <div style={{ height: 16 }} />
      </div>
    );
  }

  return (
    <div className="screen-body">
      <div className="hdr">
        <div>
          <div className="hdr-kicker">{greeting()}</div>
          <h1 className="hdr-title">Today</h1>
        </div>
        <div className="streak-chip">
          <Icon name="flame" size={15} />
          <span><b>{streak}</b> day streak</span>
        </div>
      </div>
      <p className="hdr-sub">{c.sub(due.length)}</p>

      {cards.map(p => (
        <TodayCard key={p.id} person={p} c={c} onCall={onCall} onOpen={() => openPerson(p.id)} onSnooze={onSnooze} />
      ))}

      <div className="section-label">
        <span>The rest of your circle</span>
      </div>
      <div className="card list">
        {rest.map((p, i) => <CircleRow key={p.id} person={p} onOpen={openPerson} last={i === rest.length - 1} />)}
      </div>
      <div style={{ height: 12 }} />
    </div>
  );
}

// ── Profile ──────────────────────────────────────────────────
function Profile({ person, c, onBack, onCall, onLog, onChangeFreq }) {
  const [editFreq, setEditFreq] = useState(false);
  const s = statusOf(person);
  return (
    <div className="screen-overlay slide-in">
      <div className="profile-top">
        <button className="round-btn" onClick={onBack}><Icon name="chevron-left" size={22} /></button>
        <button className="round-btn"><Icon name="ellipsis" size={22} /></button>
      </div>
      <div className="screen-body" style={{ paddingTop: 4 }}>
        <div className="profile-head">
          <Avatar person={person} size={92} ring={{ pct: person.lastDays / person.freq, color: `var(--${s.tone})` }} />
          <h1 className="profile-name">{person.name}</h1>
          <div className="profile-rel">{person.rel}</div>
          <div style={{ marginTop: 10 }}><StatusPill person={person} /></div>
        </div>

        <div className="profile-actions">
          <button className="pa-btn primary" onClick={() => onCall(person.id)}><Icon name="phone" size={22} /><span>Call</span></button>
          <button className="pa-btn"><Icon name="message" size={22} /><span>Message</span></button>
          <button className="pa-btn"><Icon name="video" size={22} /><span>FaceTime</span></button>
        </div>

        <div className="card pad">
          <div className="card-row-between">
            <div className="mini-label">Reach out</div>
            {!editFreq && <button className="link-btn" onClick={() => setEditFreq(true)}>Change</button>}
          </div>
          {!editFreq ? (
            <div className="freq-display">
              <Icon name="clock" size={18} style={{ color: 'var(--clay)' }} />
              <span><b>{freqLabel(person.freq)}</b></span>
              <span className="freq-since">· last talked {humanGap(person.lastDays)}</span>
            </div>
          ) : (
            <div className="freq-chips">
              {FREQ_OPTIONS.map(f => (
                <button key={f.days}
                  className={'chip' + (f.days === person.freq ? ' active' : '')}
                  onClick={() => { onChangeFreq(person.id, f.days); setEditFreq(false); }}>
                  {f.label}
                </button>
              ))}
            </div>
          )}
        </div>

        {person.note && (
          <div className="card pad">
            <div className="mini-label">Last talked about</div>
            <p className="note-text">{person.note}</p>
          </div>

          <div className="mini-label">Remember</div>
          <div className="detail-list">
            {person.details.map((d, i) => (
              <div className="detail-row" key={i}>
                <Icon name={d.k === 'Birthday' ? 'gift' : d.k === 'Kids' ? 'heart' : 'note'} size={17} style={{ color: 'var(--ink-3)' }} />
                <span className="detail-k">{d.k}</span>
                <span className="detail-v">{d.v}</span>

          <div className="history-list">
            {person.history.map((h, i) => (
              <div className="history-row" key={i}><span className="hist-dot" /><span>{h}</span></div>
            ))}

        </div>

        <div style={{ padding: '4px 0 8px' }}>
          <PressButton variant="soft" full onClick={() => onLog(person.id)}>
            <Icon name="check" size={18} /> Log a call
          </PressButton>
        </div>
      </div>
    </div>

}

// ── Calling overlay ──────────────────────────────────────────
function CallingOverlay({ person, onEnd }) {
  const [sec, setSec] = useState(0);
  useEffect(() => {
    const t = setInterval(() => setSec(s => s + 1), 1000);
    return () => clearInterval(t);
  }, []);
  const mm = String(Math.floor(sec / 60)).padStart(2, '0');
  const ss = String(sec % 60).padStart(2, '0');
  return (
    <div className="calling fade-in">
      <div className="calling-inner">
        <div className="calling-pulse"><Avatar person={person} size={120} /></div>
        <div className="calling-name">{person.name}</div>
        <div className="calling-status">{sec === 0 ? 'calling…' : `${mm}:${ss}`}</div>
      </div>
      <button className="end-call" onClick={onEnd}><Icon name="phone" size={26} /></button>
      <div className="calling-hint">End the call to log how it went</div>
    </div>
  );
}

// ── Log a call sheet ─────────────────────────────────────────
const MOODS = [
  { k: 'great', label: 'Lovely', face: '☺' },
  { k: 'good', label: 'Good', face: '◡' },
  { k: 'quick', label: 'Quick hello', face: '·' },
];
function LogSheet({ person, c, onClose, onSave }) {
  const [mood, setMood] = useState('great');
  const [topic, setTopic] = useState('');
  const [remember, setRemember] = useState('');
  return (
    <div className="sheet-scrim fade-in" onClick={onClose}>
      <div className="sheet slide-up" onClick={e => e.stopPropagation()}>
        <div className="sheet-grip" />
        <div className="sheet-head">
          <Avatar person={person} size={40} />
          <h2 className="sheet-title">{c.logTitle(person)}</h2>
        </div>

        <div className="mood-row">
          {MOODS.map(m => (
            <button key={m.k} className={'mood' + (mood === m.k ? ' active' : '')} onClick={() => setMood(m.k)}>
              <span className="mood-face">{m.face}</span>
              <span className="mood-label">{m.label}</span>
            </button>
          ))}
        </div>

        <label className="field-label">What did you talk about?</label>
        <textarea className="field" rows={2} value={topic} placeholder="Her new studio, the trip in May…"
          onChange={e => setTopic(e.target.value)} />

        <label className="field-label">Anything to remember?</label>
        <input className="field" value={remember} placeholder="e.g. birthday is March 3"
          onChange={e => setRemember(e.target.value)} />

        <div className="sheet-footer">
          <PressButton variant="primary" full onClick={() => onSave(person.id, { mood, topic, remember })}>
            Save & reset the timer
          </PressButton>
          <button className="text-btn" onClick={onClose}>Not now</button>
        </div>
      </div>
    </div>
  );
}

// ── Add to circle sheet ──────────────────────────────────────
function AddSheet({ onClose, onAdd }) {
  const [step, setStep] = useState(0);
  const [picked, setPicked] = useState(null);
  const [freq, setFreq] = useState(14);
  return (
    <div className="sheet-scrim fade-in" onClick={onClose}>
      <div className="sheet slide-up" onClick={e => e.stopPropagation()}>
        <div className="sheet-grip" />
        {step === 0 ? (
          <>
            <h2 className="sheet-title solo">Who do you want to keep close?</h2>
            <p className="sheet-sub">Pick someone from your contacts to add to your circle.</p>
            <div className="add-list">
              {ADD_CONTACTS.map(ct => (
                <button key={ct.id} className={'add-row' + (picked === ct.id ? ' picked' : '')} onClick={() => setPicked(ct.id)}>
                  <Avatar person={ct} size={42} />
                  <div style={{ flex: 1, textAlign: 'left' }}>
                    <div className="cr-name">{ct.name}</div>
                    <div className="cr-sub">{ct.sub}</div>
                  </div>
                  <span className={'radio' + (picked === ct.id ? ' on' : '')}>{picked === ct.id && <Icon name="check" size={14} />}</span>
                </button>
              ))}
            </div>
            <div className="sheet-footer">
              <PressButton variant="primary" full onClick={() => picked && setStep(1)}
                style={{ opacity: picked ? 1 : 0.45 }}>
                Continue
              </PressButton>
            </div>
          </>
        ) : (
          <>
            <div className="sheet-head">
              <Avatar person={ADD_CONTACTS.find(c => c.id === picked)} size={40} />
              <h2 className="sheet-title">How often with {ADD_CONTACTS.find(c => c.id === picked).name.split(' ')[0]}?</h2>
            </div>
            <p className="sheet-sub">We’ll gently remind you when it’s been a while.</p>
            <div className="freq-chips big">
              {FREQ_OPTIONS.map(f => (
                <button key={f.days} className={'chip' + (f.days === freq ? ' active' : '')} onClick={() => setFreq(f.days)}>
                  {f.label}
                </button>
              ))}
            </div>
            <div className="sheet-footer">
              <PressButton variant="primary" full onClick={() => onAdd(picked, freq)}>
                Add to my circle
              </PressButton>
              <button className="text-btn" onClick={() => setStep(0)}>Back</button>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

// ── Bottom nav ───────────────────────────────────────────────
function BottomNav({ tab, setTab, onAdd }) {
  return (
    <div className="bottom-nav">
      <button className={'nav-item' + (tab === 'today' ? ' active' : '')} onClick={() => setTab('today')}>
        <Icon name="home" size={23} /><span>Today</span>
      </button>
      <button className="nav-add" onClick={onAdd}><Icon name="plus" size={26} /></button>
      <button className={'nav-item' + (tab === 'circle' ? ' active' : '')} onClick={() => setTab('circle')}>
        <Icon name="users" size={23} /><span>Circle</span>
      </button>
    </div>
  );
}

// ── App root (per device) ────────────────────────────────────
function App({ platform, tweaks }) {
  const [people, setPeople] = useState(() => SEED_PEOPLE.map(p => ({ ...p })));
  const [tab, setTab] = useState('today');
  const [profileId, setProfileId] = useState(null);
  const [sheet, setSheet] = useState(null); // {type:'log'|'add', id?}
  const [calling, setCalling] = useState(null);
  const [toast, setToast] = useState(null);
  const c = COPY[tweaks.warmth] || COPY.motivating;

  const person = id => people.find(p => p.id === id);
  const flash = msg => { setToast(msg); setTimeout(() => setToast(null), 2600); };

  const startCall = (id) => setCalling(id);
  const endCall = () => { const id = calling; setCalling(null); setSheet({ type: 'log', id }); };

  const saveLog = (id, data) => {
    setPeople(ps => ps.map(p => p.id === id ? {
      ...p, lastDays: 0,
      note: data.topic || p.note,
      history: data.topic ? [data.topic, ...p.history].slice(0, 5) : p.history,
      details: data.remember ? [{ k: 'Note', v: data.remember }, ...p.details].slice(0, 4) : p.details,
    } : p));
    setSheet(null);
    flash(c.saved(person(id)));
  };

  const addPerson = (cid, freq) => {
    const ct = ADD_CONTACTS.find(c => c.id === cid);
    if (people.some(p => p.id === cid)) { setSheet(null); return; }
    setPeople(ps => [...ps, {
      id: cid, name: ct.name, rel: 'New', tone: ct.tone, freq, lastDays: 0,
      note: '', details: [], history: [],
    }]);
    setSheet(null);
    flash(`${ct.name.split(' ')[0]} is in your circle.`);
  };

  const snooze = (id) => {
    setPeople(ps => ps.map(p => p.id === id ? { ...p, lastDays: Math.max(0, Math.round(p.freq * 0.4)) } : p));
    flash('Snoozed — we’ll remind you soon.');
  };

  const changeFreq = (id, freq) => setPeople(ps => ps.map(p => p.id === id ? { ...p, freq } : p));

  return (
    <div className={'basmi app-' + platform} data-accent={tweaks.accent}>
      <div className="app-scroll">
        <Home people={people} tab={tab} c={c}
          onCall={startCall} openPerson={setProfileId} onSnooze={snooze} />
      </div>

      <BottomNav tab={tab} setTab={setTab} onAdd={() => setSheet({ type: 'add' })} />

      {profileId && (
        <Profile person={person(profileId)} c={c}
          onBack={() => setProfileId(null)}
          onCall={startCall}
          onLog={(id) => setSheet({ type: 'log', id })}
          onChangeFreq={changeFreq} />
      )}

      {calling && <CallingOverlay person={person(calling)} onEnd={endCall} />}

      {sheet?.type === 'log' && <LogSheet person={person(sheet.id)} c={c} onClose={() => setSheet(null)} onSave={saveLog} />}
      {sheet?.type === 'add' && <AddSheet onClose={() => setSheet(null)} onAdd={addPerson} />}

      {toast && <div className="toast slide-up-sm"><Icon name="heart" size={16} />{toast}</div>}
    </div>
  );
}

function greeting() {
  return 'Good morning';
}

Object.assign(window, { App });

  </script>

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

  </script>

  <script type="text/babel">

function AndroidAppBar({ title = 'Title', large = false }) {

// ─────────────────────────────────────────────────────────────

// ─────────────────────────────────────────────────────────────
function AndroidListItem({ headline, supporting, leading }) {

          options={['gentle', 'motivating']}
          onChange={(v) => setTweak('warmth', v)} />
        <TweakSection label="Home-screen widget" />
        <TweakSelect label="Featured" value={widget}
          options={['Who to call', 'Coming up', 'Overdue']}
          onChange={(v) => setTweak('widget', v)} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root />);

  </script>
</body>
</html>
